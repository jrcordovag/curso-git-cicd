name: Pipeline CI-CD - Dia 6

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ==========================================
  # ETAPA 1: INTEGRACIÓN CONTINUA (CI)
  # ==========================================
  pruebas-y-calidad:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el codigo del repositorio
        uses: actions/checkout@v4

      - name: Instalar validador de Bash (ShellCheck)
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Analizar la sintaxis de script.sh y test.sh
        run: |
          shellcheck script.sh
          shellcheck test.sh

      - name: Dar permisos de ejecucion
        run: chmod +x script.sh test.sh

      - name: Ejecutar Pruebas Automatizadas
        run: ./test.sh

  # ==========================================
  # ETAPA 2: DESPLIEGUE CONTINUO (CD)
  # ==========================================
  despliegue-produccion:
    runs-on: ubuntu-latest
    # LA MAGIA DE CD: Solo se ejecuta si la etapa de CI pasa en VERDE
    needs: pruebas-y-calidad
    # Solo despliega en push directos a main, no en Pull Requests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Simular autenticacion y Despliegue en Servidor Remoto
        # Inyectamos el Secreto guardado en GitHub como variable de entorno
        env:
          TOKEN_ACCESO: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "=== Iniciando Proceso de Despliegue Automático ==="
          echo "Autenticando con el token de acceso remoto..."
          # Verificamos que el secreto exista sin imprimir su valor real
          if [ -z "$TOKEN_ACCESO" ]; then
            echo "✖ Error: El token de despliegue no está configurado."
            exit 1
          fi
          echo "✔ Autenticación exitosa."
          echo "Desplegando la versión '$(git rev-parse --short HEAD)' al entorno de PRODUCCIÓN..."
          echo "=== ¡Despliegue completado con éxito! 🚀 ==="
